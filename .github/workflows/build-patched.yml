name: Build Patched (secure_tcp)

# Build and push Docker image for patched rustdesk-server with secure_tcp support.
# Triggered by tagging a version like "1.1.15-patched1"

on:
  workflow_dispatch:
  push:
    tags:
      - '*patched*'

env:
  GHCR_IMAGE: ghcr.io/davidelectricfree/rustdesk-server-patched

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push patched image
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: davidelectricfree
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./docker/Dockerfile.build
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.TAG }}
            ${{ env.GHCR_IMAGE }}:latest
