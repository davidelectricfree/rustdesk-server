# RustDesk Server (Patched) - with secure_tcp KeyExchange support
# Deploy on NAS with: docker compose up -d
#
# Important: Replace YOUR_KEY_HERE with your actual RustDesk key (run: cat /var/packages/RustDeskServer/etc/key)
# The key is also available from your SPK install's config

services:
  hbbs:
    image: ghcr.io/davidelectricfree/rustdesk-server-patched:latest
    container_name: rustdesk-hbbs-patched
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/data
    command:
      - hbbs
      - -k
      - ${RUSTDESK_KEY:-YOUR_KEY_HERE}
    environment:
      - ALWAYS_USE_RELAY=Y
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  hbbr:
    image: ghcr.io/davidelectricfree/rustdesk-server-patched:latest
    container_name: rustdesk-hbbr-patched
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/data
    command:
      - hbbr
      - -k
      - ${RUSTDESK_KEY:-YOUR_KEY_HERE}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: WebSocket proxy for clients behind strict firewalls
